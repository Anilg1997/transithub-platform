      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: transithub-notification-service
    ports:
      - "8097:8097"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      EUREKA_URI: http://service-registry:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-Mongo@2024}@mongodb:27017/transithub?authSource=admin
      SPRING_MAIL_HOST: localstack
      SPRING_MAIL_PORT: 4566
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      localstack:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    networks:
      - transithub-network

