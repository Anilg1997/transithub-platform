version: "3.8"

services:
  # ============================================================
  # INFRASTRUCTURE SERVICES
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: transithub-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transithub}
      POSTGRES_USER: ${POSTGRES_USER:-transithub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-TransitHub@2024}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init-schemas.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transithub -d transithub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transithub-network

  mongodb:
    image: mongo:7
    container_name: transithub-mongodb
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-Mongo@2024}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-transithub}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transithub-network

  redis:
    image: redis:7-alpine
    container_name: transithub-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-Redis@2024} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transithub-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: transithub-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: echo "ruok" | nc localhost 2181
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transithub-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: transithub-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "${KAFKA_INTERNAL_PORT:-29092}:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transithub-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: transithub-elasticsearch
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - transithub-network

  localstack:
    image: localstack/localstack:latest
    container_name: transithub-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,sns,ses,secretsmanager,cloudwatch
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      EDGE_PORT: 4566
    volumes:
      - localstack-data:/var/lib/localstack
      - "./infra/localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transithub-network

  # ============================================================
  # MONITORING
  # ============================================================
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: transithub-zipkin
    ports:
      - "9411:9411"
    environment:
      STORAGE_TYPE: mem
    networks:
      - transithub-network

  prometheus:
    image: prom/prometheus:latest
    container_name: transithub-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - transithub-network

  grafana:
    image: grafana/grafana:latest
    container_name: transithub-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - transithub-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: transithub-kafka-ui
    ports:
      - "${KAFKA_UI_PORT:-8090}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: transithub
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - transithub-network

  mongo-express:
    image: mongo-express:latest
    container_name: transithub-mongo-express
    ports:
      - "${MONGO_EXPRESS_PORT:-8091}:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-Mongo@2024}
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - transithub-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: transithub-pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@transithub.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - transithub-network

  # ============================================================
  # APPLICATION SERVICES (25 microservices)
  # ============================================================
  service-registry:
    build:
      context: ./services/service-registry
      dockerfile: Dockerfile
    container_name: transithub-service-registry
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - transithub-network

  config-server:
    build:
      context: ./services/config-server
      dockerfile: Dockerfile
    container_name: transithub-config-server
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
    volumes:
      - ./config-repo:/config-repo
    depends_on:
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - transithub-network

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: transithub-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      EUREKA_URI: http://service-registry:8761/eureka
    depends_on:
      service-registry:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - transithub-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: transithub-auth-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      EUREKA_URI: http://service-registry:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transithub?currentSchema=auth_schema
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-transithub}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-TransitHub@2024}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-TransitHub_JWT_Min32Char_SecretKey_2024}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - transithub-network

