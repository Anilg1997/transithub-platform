      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-Mongo@2024}@mongodb:27017/transithub?authSource=admin
      ELASTICSEARCH_URIS: http://elasticsearch:9200
    depends_on:
      elasticsearch:
