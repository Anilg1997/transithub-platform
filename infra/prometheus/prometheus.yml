global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'transithub-service-registry'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['service-registry:8761']

  - job_name: 'transithub-config-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['config-server:8888']

  - job_name: 'transithub-api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'transithub-auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: 'transithub-user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8082']

  - job_name: 'transithub-flight-inventory'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['flight-inventory-service:8083']

  - job_name: 'transithub-flight-booking'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['flight-booking-service:8084']

  - job_name: 'transithub-bus-inventory'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['bus-inventory-service:8086']

  - job_name: 'transithub-train-inventory'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['train-inventory-service:8089']

  - job_name: 'transithub-payment-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['payment-service:8094']

  - job_name: 'transithub-search-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['search-service:8098']

  - job_name: 'transithub-notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8097']
