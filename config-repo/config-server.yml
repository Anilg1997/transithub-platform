spring:
  application:
    name: config-server
server:
  port: 8888
spring:
  cloud:
    config:
      server:
        git:
          uri: file://${user.dir}/config-repo
          default-label: main
          clone-on-start: false
          skip-ssl-validation: true
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
