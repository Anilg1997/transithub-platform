server:
  port: 8084
spring:
  application:
    name: flight-booking-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transithub}?currentSchema=flight_schema
    username: ${DB_USERNAME:transithub}
    password: ${DB_PASSWORD:TransitHub@2024}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: flight_schema
  redis:
    host: ${REDIS_HOST:localhost}
    password: ${REDIS_PASSWORD:Redis@2024}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
