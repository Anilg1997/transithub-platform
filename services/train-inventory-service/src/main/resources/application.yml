server:
  port: 8089
spring:
  application:
    name: train-inventory-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transithub}?currentSchema=train_schema
    username: ${DB_USERNAME:transithub}
    password: ${DB_PASSWORD:TransitHub@2024}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: train_schema
  flyway:
    schemas: train_schema
    locations: classpath:db/migration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
